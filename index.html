<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Squidly1408 Rotating Logo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Bitcount+Single:wght@100..900&family=Great+Vibes&family=Lavishly+Yours&family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">

    <style>
        html,
        body {
            height: 100%;
            margin: 0;
        }
        h1 {
            position: absolute;
            top: 20px;
            font-family: 'Audiowide', cursive;
            text-align: center;
            width: 100%;
            z-index: 10;
            
        }
        a {
            text-decoration: none;
            color: #10cfd5;
            font-size: 0.6em;
        }

        body {
            background: radial-gradient(circle at center,

                    rgba(16, 207, 213, 0.22) 15%,
                    rgba(16, 207, 213, 0.00) 80%), #171717;
            ;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1200px;
            overflow: hidden;

        }

        .scene {
            transform-style: preserve-3d;
        }

        .extrude {
            position: relative;
            width: 240px;
            height: 240px;
            transform-style: preserve-3d;
            animation: spin 8s linear infinite;
        }

        .layer {
            position: absolute;
            inset: 0;
            background: url("./image.svg") center / contain no-repeat;
            transform-style: preserve-3d;
        }

        /* Front face */
        .front {
            transform: translateZ(0);
            filter: drop-shadow(0 15px 30px rgba(0, 0, 0, 0.6));
        }

        /* Depth layers */
        .depth {
            opacity: 0.9;
            filter: brightness(0.75);
        }

        .back {
            transform: translateZ(-22px);
            filter: drop-shadow(0 15px 30px rgba(0, 0, 0, 0.6));
        }

        @keyframes spin {
            from {
                transform: rotateY(0deg);
            }

            to {
                transform: rotateY(360deg);
            }
        }
    </style>
</head>

<body>
    <h1 style="color: white;">Squidly1408</br>Rotating Logo</br><a href="https://github.com/Squidly1408" target="_blank" rel="noopener noreferrer">[GitHub Link]</a></h1>

    <div class="scene">
        <div class="extrude">

            <!-- Front -->
            <div class="layer front"></div>

            <!-- Thickness -->
            <div class="layer depth" style="transform: translateZ(-2px);"></div>
            <div class="layer depth" style="transform: translateZ(-4px);"></div>
            <div class="layer depth" style="transform: translateZ(-6px);"></div>
            <div class="layer depth" style="transform: translateZ(-8px);"></div>
            <div class="layer depth" style="transform: translateZ(-10px);"></div>
            <div class="layer depth" style="transform: translateZ(-12px);"></div>
            <div class="layer depth" style="transform: translateZ(-14px);"></div>
            <div class="layer depth" style="transform: translateZ(-16px);"></div>
            <div class="layer depth" style="transform: translateZ(-18px);"></div>
            <div class="layer depth" style="transform: translateZ(-20px);"></div>

            <!-- Front -->
            <div class="layer back"></div>
        </div>
    </div>
</body>

</html>
